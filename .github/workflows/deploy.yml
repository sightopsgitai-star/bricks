name: Deploy to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Flutter Dependencies
        run: |
          cd demo-main
          flutter pub get

      - name: Build Flutter Web
        run: |
          cd demo-main
          flutter build web --release

      - name: Copy files to EC2 via SCP
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.AWS_EC2_HOST }}
          username: ${{ secrets.AWS_EC2_USER }}
          key: ${{ secrets.AWS_EC2_SSH_KEY }}
          source: "**"
          target: "/home/ubuntu/bricks"
          overwrite: true

      - name: SSH to EC2 and Restart Backend
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.AWS_EC2_HOST }}
          username: ${{ secrets.AWS_EC2_USER }}
          key: ${{ secrets.AWS_EC2_SSH_KEY }}
          script: |
            # Set up PATH and load user environment for non-interactive SSH shells
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            export PATH=$PATH:$HOME/.nvm/versions/node/$(node -v 2>/dev/null)/bin:$HOME/.npm-global/bin:/usr/local/bin:/usr/bin

            # Navigate to the backend folder inside the new bricks directory
            cd /home/ubuntu/bricks/aws_deploy/backend

            # Clean and install production dependencies (respecting package overrides)
            rm -rf node_modules package-lock.json
            npm install --omit=dev

            # Restart the app using PM2 (using npx pm2 guarantees execution)
            npx pm2 delete bricks-backend || true
            npx pm2 start server.js --name "bricks-backend"
            npx pm2 save


